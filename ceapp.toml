# ce-fleet — fleet enrollment + rollup delegate service. Installed + supervised by the one `ce` node via ce-appmgr.

[app]
name    = "ce-fleet"
version = "0.1.0"
summary = "Fleet enrollment delegate: turns one-time nonce-tracked org-root caps into per-node working caps and rolls up atlas/status/history across a subtree."
runtime = "native"
publisher = "c0be11e0ce0aaa769da6f9970244947d3d32a0c0d8302fb5f41f73d7950be456"

[native]
bin = "ce-fleet-enroll"
[native.artifacts]
"darwin-amd64" = "PLACEHOLDER_darwin_amd64"
"linux-amd64"  = "PLACEHOLDER_linux_amd64"

[deps]
# Local CE node (atlas/status/history); requires CE_FLEET_DELEGATE_CAP + CE_FLEET_BOOTSTRAP_SECRET env.

[sandbox]
tier       = "none"
net        = "none"
capability = "inherit"

[daemon]
# Long-running HTTP enrollment + rollup service; binds an externally reachable port (default 0.0.0.0:8855).
enabled = true
args    = []
restart = "on-failure"
